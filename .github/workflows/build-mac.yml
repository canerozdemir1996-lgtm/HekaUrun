name: Build macOS App

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  build-mac:
    name: Build UrunYonetimMasasi_v3.app (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: intel-x64
            runner: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install macOS system dependencies
        run: |
          brew update
          brew install unixodbc

      - name: Make build script executable
        run: chmod +x build_mac.sh

      - name: Build app
        run: ./build_mac.sh --clean

      - name: Smoke test packaged app
        run: |
          file "dist/UrunYonetimMasasi_v3.app/Contents/MacOS/UrunYonetimMasasi_v3"
          codesign --verify --deep --strict --verbose=2 "dist/UrunYonetimMasasi_v3.app"
          QT_QPA_PLATFORM=offscreen "dist/UrunYonetimMasasi_v3.app/Contents/MacOS/UrunYonetimMasasi_v3" --smoke-test

      - name: Zip app bundle
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent UrunYonetimMasasi_v3.app UrunYonetimMasasi_v3-macOS-${{ matrix.arch }}.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: UrunYonetimMasasi_v3-macOS-${{ matrix.arch }}
          path: dist/UrunYonetimMasasi_v3-macOS-${{ matrix.arch }}.zip
          if-no-files-found: error
